<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何冠霖 ＆ 楊念臻 ｜ 溫馨極光之約</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', 'Noto Serif TC', serif;
            background-color: #faf7f2;
            color: #4a3e3d;
            overflow-x: hidden;
            line-height: 1.8;
        }
        .aurora-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 600px;
            background: radial-gradient(circle at 50% -100px, rgba(244, 219, 212, 0.45) 0%, rgba(228, 239, 233, 0.4) 50%, rgba(250, 247, 242, 0) 100%);
            z-index: 0; pointer-events: none;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        header { padding: 25px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(224, 203, 189, 0.3); margin-bottom: 40px; }
        .logo { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 600; color: #b18f6a; text-decoration: none; letter-spacing: 2px; }
        .logo span { font-size: 18px; font-weight: 300; color: #d8bfa7; }
        nav { display: flex; gap: 25px; }
        nav a { text-decoration: none; color: #726259; font-size: 14px; font-weight: 500; }
        
        .hero-section { text-align: center; margin-bottom: 60px; }
        .main-title-container { margin-bottom: 30px; }
        .main-title-container h1 { font-family: 'Noto Serif TC', serif; font-size: 38px; color: #5c4a42; letter-spacing: 3px; margin-bottom: 10px; }
        .main-title-container .tagline { font-family: 'Cinzel', serif; font-size: 16px; color: #b18f6a; letter-spacing: 5px; }
        
        .static-photos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }
        .photo-box {
            background: #ffffff;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(186, 172, 161, 0.1);
        }
        .photo-box img { width: 100%; height: auto; border-radius: 8px; object-fit: cover; display: block; }

        .section-title { font-family: 'Noto Serif TC', serif; font-size: 26px; text-align: center; color: #5c4a42; margin-bottom: 40px; }
        
        /* 故事卡片排版 */
        .story-card { 
            background: rgba(255, 255, 255, 0.65); 
            border: 1px solid rgba(228, 203, 189, 0.5); 
            border-radius: 24px; 
            padding: 40px; 
            margin-bottom: 80px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 35px;
            align-items: center;
        }
        .story-content { font-family: 'Noto Serif TC', serif; font-size: 16px; color: #5c4a42; line-height: 2.1; }
        .story-content p { margin-bottom: 15px; }
        
        .story-photo-box {
            background: #ffffff;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(186, 172, 161, 0.1);
            border: 1px solid rgba(228, 203, 189, 0.3);
        }
        .story-photo-box img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            object-fit: cover;
        }
        
        footer { text-align: center; padding: 60px 0 80px; border-top: 1px solid rgba(224, 203, 189, 0.4); }
        .footer-date { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 600; color: #5c4a42; letter-spacing: 4px; margin-bottom: 15px; }
        .footer-thank { font-family: 'Noto Serif TC', serif; font-size: 15px; color: #8c786c; }
        
        @media (max-width: 768px) {
            .static-photos { grid-template-columns: 1fr; }
            .story-card { grid-template-columns: 1fr; gap: 25px; }
            .main-title-container h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>

    <div class="container">
        
        <header>
            <a href="#" class="logo">K <span>&</span> N</a>
            <nav>
                <a href="#story">我們的故事</a>
                <a href="#date">結婚日期</a>
            </nav>
        </header>

        <section class="hero-section">
            <div class="main-title-container">
                <h1>何冠霖 ＆ 楊念臻</h1>
                <div class="tagline">UNDER THE AURORA, WE PROMISED</div>
            </div>
        </section>

        <section class="static-photos">
            <div class="photo-box"><img src="./pic1.jpg" alt="極光約定 1"></div>
            <div class="photo-box"><img src="./pic2.jpg" alt="極光約定 2"></div>
            <div class="photo-box"><img src="./pic3.jpg" alt="極光約定 3"></div>
            <div class="photo-box"><img src="./pic4.jpg" alt="極光約定 4"></div>
        </section>

        <section id="story">
            <h2 class="section-title">我們的故事</h2>
            <div class="story-card">
                <div class="story-content">
                    <p>那一天，在北國浩瀚閃耀、充滿幸福色彩的極光之下，他許下了守護一生的承諾；在絢爛的光芒與群星見證中，她點了頭。</p>
                    <p>這盒精挑細選的喜餅，承載著我們專屬的「極光之約」，將這份遠自天際的璀璨浪漫、真摯溫暖與無比幸福，親手傳遞給在我們生命中無比珍貴的您。</p>
                    <p>期待在 2026 年 9 月 19 日這一天，與大家共同開啟人生的全新篇章，幸福蔓延，溫馨常在。</p>
                </div>
                <div class="story-photo-box">
                    <img src="./pic5.jpg" alt="我們的故事精選照">
                </div>
            </div>
        </section>

        <footer id="date">
            <div class="footer-date">2026 . 09 . 19</div>
            <div class="footer-thank">我們結婚了！誠摯感謝您的陪伴與滿滿祝福 ✨</div>
        </footer>

    </div>

</body>
</html>
