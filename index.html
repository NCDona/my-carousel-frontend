<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何冠霖 ＆ 楊念臻 ｜ 極光之約</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: #faf7f2; color: #4a3e3d; line-height: 1.8; overflow-x: hidden; }
        
        /* Header */
        header { width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(224, 203, 189, 0.3); background: #faf7f2; }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 600; color: #b18f6a; text-decoration: none; }
        nav { display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #726259; font-size: 14px; font-weight: 500; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        /* Hero */
        .hero-section { position: relative; width: 100%; height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('./pic6.jpg') center/cover no-repeat; z-index: -1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); z-index: 0; }
        .hero-content { position: relative; z-index: 1; padding: 20px; }
        .hero-names { font-family: 'Noto Serif TC', serif; font-size: 2.5rem; margin-bottom: 15px; }
        .hero-tagline { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 6px; opacity: 0.9; }
        .hero-sub { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; margin-top: 10px; }

        /* 修正後的故事區 (Flex 排版確保穩定) */
        .section-title { font-size: 22px; margin: 40px 0 20px; text-align: center; color: #5c4a42; }
        .story-wrapper { display: flex; flex-direction: column; gap: 20px; background: rgba(255, 255, 255, 0.6); padding: 30px; border-radius: 20px; border: 1px solid rgba(228, 203, 189, 0.3); }
        .story-info { display: flex; flex-direction: column; gap: 15px; }
        .info-item { display: flex; align-items: center; gap: 12px; }
        .info-icon { color: #b18f6a; width: 25px; }
        .story-text { line-height: 2; }
        .story-frame { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; }
        .story-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 相簿 */
        .gallery-nav-icons { display: flex; gap: 15px; color: #b18f6a; cursor: pointer; font-size: 20px; }
        .gallery-wrapper { overflow: hidden; width: 100%; margin-bottom: 40px; }
        .gallery-grid { display: flex; gap: 15px; transition: transform 0.5s ease; }
        .gallery-item { flex: 0 0 250px; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        @media (min-width: 768px) {
            .story-wrapper { flex-direction: row; align-items: center; }
            .story-info { flex: 1; border-right: 1px solid rgba(228, 203, 189, 0.3); }
            .story-text { flex: 2; padding: 0 30px; }
            .story-frame { flex: 1; height: 350px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">K <span>&</span> N</a>
        <nav><a href="#story">我們的故事</a><a href="#gallery">相簿</a></nav>
    </header>

    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-names">何冠霖 ＆ 楊念臻</div>
            <div class="hero-tagline">UNDER THE AURORA, WE PROMISED</div>
            <div class="hero-sub">極光之約</div>
        </div>
    </section>

    <div class="container">
        <section id="story">
            <h2 class="section-title">我們的故事</h2>
            <div class="story-card">
                <div class="story-info">
                    <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-heart"></i></div>
                        <div class="info-text"><p style="font-size: 16px; font-weight: 600;">何冠霖 ＆ 楊念臻</p></div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-calendar-days"></i></div>
                        <div class="info-text"><h4>登記紀念日</h4><p>2026 / 09 / 19</p></div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-gift"></i></div>
                        <div class="info-text"><h4>分享喜悅</h4><p>卡柏蒂 CUPETIT<br><span style="color: #b18f6a;">&lt;極光之約&gt;</span></p></div>
                    </div>
                </div>
                <div class="story-content">
                    <p>人們說，看見極光就會幸福一輩子。於是在阿拉斯加的極光見證下，我們許下了一生的承諾。<br><br>這份喜餅承載著我們的浪漫，願與您分享這份遠自天際的幸福與美好。</p>
                </div>
                <div class="story-frame"><img src="./pic5.jpg" alt="故事照"></div>
            </div>
        </section>
        <section id="gallery">
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 40px 0 20px;">
                <h2 class="section-title" style="margin:0">浪漫相簿</h2>
                <div class="gallery-nav-icons">
                    <i class="fa-solid fa-angles-left" onclick="slideGallery(-1)"></i> 
                    <i class="fa-solid fa-play" onclick="slideGallery(1)"></i>
                </div>
            </div>
            <div class="gallery-wrapper">
                <div class="gallery-grid" id="galleryGrid">
                    <div class="gallery-item"><img src="./pic1.jpg"></div>
                    <div class="gallery-item"><img src="./pic2.jpg"></div>
                    <div class="gallery-item"><img src="./pic3.jpg"></div>
                    <div class="gallery-item"><img src="./pic4.jpg"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let scrollPos = 0;
        const grid = document.getElementById('galleryGrid');
        function slideGallery(direction) {
            const itemWidth = 265;
            scrollPos += direction * itemWidth;
            const maxScroll = grid.scrollWidth - grid.clientWidth;
            scrollPos = Math.max(0, Math.min(scrollPos, maxScroll));
            grid.style.transform = `translateX(-${scrollPos}px)`;
        }
    </script>
</body>
</html>
