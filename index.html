<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何冠霖 ＆ 楊念臻 ｜ 極光之約</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: #faf7f2; color: #4a3e3d; line-height: 1.8; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        
        /* 手機版 Header */
        header { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(224, 203, 189, 0.3); }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 600; color: #b18f6a; text-decoration: none; }
        nav { display: flex; gap: 15px; }
        nav a { text-decoration: none; color: #726259; font-size: 13px; }

        .hero-section { text-align: center; margin: 40px 0; }
        .main-title h1 { font-family: 'Noto Serif TC', serif; font-size: 32px; color: #5c4a42; margin-bottom: 10px; }
        .tagline { font-family: 'Cinzel', serif; font-size: 14px; color: #b18f6a; letter-spacing: 3px; }
        
        /* 斷行控制 */
        .mobile-break { display: inline; }
        @media (max-width: 768px) { .mobile-break { display: block; } }

        .hero-carousel { width: 100%; height: 300px; border-radius: 20px; overflow: hidden; position: relative; border: 4px solid #fff; margin-top: 20px; }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease; }
        .carousel-slide { min-width: 100%; height: 100%; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* 故事卡片 */
        .section-title { font-size: 22px; margin: 40px 0 20px; text-align: center; color: #5c4a42; }
        .story-card { background: rgba(255, 255, 255, 0.6); padding: 20px; border-radius: 20px; border: 1px solid rgba(228, 203, 189, 0.3); }
        .story-info { display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; border-bottom: 1px solid rgba(228, 203, 189, 0.3); margin-bottom: 20px; }
        .info-item { display: flex; align-items: center; gap: 12px; }
        .info-icon { color: #b18f6a; width: 25px; }
        .info-text h4 { font-size: 11px; color: #a8998a; text-transform: uppercase; }
        .info-text p { font-size: 14px; color: #5c4a42; font-weight: 500; }
        
        .story-frame { width: 100%; height: 250px; margin-top: 20px; border-radius: 12px; overflow: hidden; }
        .story-frame img { width: 100%; height: 100%; object-fit: cover; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 40px; }
        .gallery-item { border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        @media (min-width: 768px) {
            .hero-carousel { height: 500px; }
            .story-card { display: grid; grid-template-columns: 250px 1fr 250px; gap: 30px; align-items: center; }
            .story-info { border-bottom: none; border-right: 1px solid rgba(228, 203, 189, 0.3); padding-bottom: 0; margin-bottom: 0; padding-right: 20px; }
            .gallery-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="#" class="logo">K <span>&</span> N</a>
            <nav>
                <a href="#story">我們的故事</a>
                <a href="#gallery">相簿</a>
            </nav>
        </header>

        <section class="hero-section">
            <div class="main-title"><h1>何冠霖 ＆ 楊念臻</h1></div>
            <div class="tagline">UNDER THE AURORA, <span class="mobile-break"></span> WE PROMISED</div>
            <div class="hero-carousel">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-slide"><img src="./pic1.jpg" alt="1"></div>
                    <div class="carousel-slide"><img src="./pic2.jpg" alt="2"></div>
                    <div class="carousel-slide"><img src="./pic3.jpg" alt="3"></div>
                    <div class="carousel-slide"><img src="./pic4.jpg" alt="4"></div>
                </div>
            </div>
        </section>

        <section id="story">
            <h2 class="section-title">我們的故事</h2>
            <div class="story-card">
                <div class="story-info">
                    <div class="info-item">
                        <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-heart"></i></div>
                <div class="info-text">
                <p>何冠霖 ＆ 楊念臻</p>
            </div>
</div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-calendar-days"></i></div>
                        <div class="info-text"><h4>登記紀念日</h4><p>2026 / 09 / 19</p></div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fa-solid fa-gift"></i></div>
                        <div class="info-text">
                            <h4>分享喜悅</h4>
                            <p style="line-height: 1.4; margin-top: 2px;">
                                卡柏蒂 CUPETIT<br>
                                <span style="color: #b18f6a;">&lt;極光之約&gt;</span>
                            </p>
                        </div>
                    </div>
                </div>
                <div class="story-content">
                    <p>在北國極光下，我們許下了一生的承諾。這份喜餅承載著我們的浪漫，願與您分享這份遠自天際的幸福與美好。</p>
                </div>
                <div class="story-frame"><img src="./pic5.jpg" alt="故事照"></div>
            </div>
        </section>

        <section id="gallery">
            <h2 class="section-title">浪漫相簿</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="./pic1.jpg" alt="1"></div>
                <div class="gallery-item"><img src="./pic2.jpg" alt="2"></div>
                <div class="gallery-item"><img src="./pic3.jpg" alt="3"></div>
                <div class="gallery-item"><img src="./pic4.jpg" alt="4"></div>
            </div>
        </section>
    </div>

    <script>
        let index = 0;
        setInterval(() => {
            index = (index + 1) % 4;
            document.getElementById('carouselTrack').style.transform = `translateX(-${index * 100}%)`;
        }, 4000);
    </script>
</body>
</html>
