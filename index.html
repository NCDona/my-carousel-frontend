<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬輪播圖</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        .carousel-container { width: 80%; max-width: 800px; height: 500px; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; position: relative; border-radius: 15px; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .carousel-slide { min-width: 100%; height: 100%; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; } /* 確保照片填滿，不變形 */
        .btn-prev, .btn-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; font-size: 2rem; cursor: pointer; padding: 10px; z-index: 10; transition: background 0.3s; border-radius: 5px; }
        .btn-prev:hover, .btn-next:hover { background: rgba(0,0,0,0.8); }
        .btn-prev { left: 15px; }
        .btn-next { right: 15px; }
    </style>
</head>
<body>

<div class="carousel-container">
    <button class="btn-prev" onclick="moveSlide(-1)">&#10094;</button>
    <div class="carousel-track" id="track">
        <!-- 💡 這裡就是關鍵！我已經改成抓你的四張專屬照片路徑了 -->
        <div class="carousel-slide"><img src="pic1.jpg" alt="我的照片 1"></div>
        <div class="carousel-slide"><img src="pic2.jpg" alt="我的照片 2"></div>
        <div class="carousel-slide"><img src="pic3.jpg" alt="我的照片 3"></div>
        <div class="carousel-slide"><img src="pic4.jpg" alt="我的照片 4"></div>
    </div>
    <button class="btn-next" onclick="moveSlide(1)">&#10095;</button>
</div>

<script>
    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.carousel-slide');
    let currentIndex = 0;

    function moveSlide(direction) {
        currentIndex = (currentIndex + direction + slides.length) % slides.length;
        updateCarousel();
    }

    function updateCarousel() {
        const offset = -currentIndex * 100;
        track.style.transform = `translateX(${offset}%)`;
    }

    // 自動輪播 (選用功能)
    setInterval(() => moveSlide(1), 5000); // 每 5 秒自動跳下一張
</script>

</body>
</html>
